ground_segmentation_node:
  ros__parameters:
    input_topic: /rslidar_points
    ground_topic: /ground_points
    nonground_topic: /nonground_points

    roi_x_min: 0.0
    roi_x_max: 8.0
    roi_y_min: -2.5
    roi_y_max: 2.5
    roi_z_min: -3.0
    roi_z_max: 2.0

    grid_resolution: 0.10
    min_points_per_cell: 1
    base_ground_threshold: 0.08
    distance_threshold_coeff: 0.01
    negative_outlier_threshold: 0.20
    min_valid_neighbors: 2
